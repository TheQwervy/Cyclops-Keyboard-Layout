name: Cyclops v3.1
description: u/theqwervy
bottomRowWidthMode: Identical
numberRowMode: AlwaysDisabled
overrideWidths:
  Regular: 0.107
attributes:
  moreKeyMode: OnlyExplicit
rows:
  - letters:
    - [b,0]
    - [u,1]
    - [i,2]
    - [o,3]
    - type: base
      spec: '!icon/delete_key|!code/key_delete'
      moreKeys: ['!icon/action_undo|!code/action_undo','!icon/action_redo|!code/action_redo']
      attributes:
        width: FunctionalKey
        style: Functional
    - [s,'#']
    - [r,'*']
    - [h,'@']
    - [m,'%|%']
  - letters:
    - ['v','`','~']
    - [p,4]
    - [e,5]
    - [a,6]
    - type: space
      attributes:
        width: FunctionalKey
    - [n,'(','[','{','<']
    - [t,')',']','}','>']
    - [f,'=','≠']
    - [y,'+']
    splittable: true
  - letters:
    - [x,'!icon/numpad|!code/key_to_alpha_1_layout']
    - [g,7]
    - [d,8]
    - [c,9]
    - $shift
    - [l,'!']
    - [w,'$','¥']
    - [k,'^']
    - [j,'\','|']
  - bottom:
    - $action
    - [q,'!icon/action_select_all|!code/action_select_all']
    - ["'",'"']
    - [',','?']
    - type: base
      spec: '!icon/enter_key|!code/key_enter'
      moreKeys: ['!icon/action_copy|!code/action_copy','!icon/action_paste|!code/action_paste','!icon/action_cut|!code/action_cut','!icon/action_clipboard_history|!code/action_clipboard_history']
      attributes:
        width: FunctionalKey
        style: Functional
    - ['.','/']
    - ['-','_','—','–']
    - [z,'&']
    - [':',';']
    splittable: true
    attributes:
      moreKeyMode: OnlyExplicit
subKeyboards:
  Alphabet1:
    attributes:
      moreKeyMode: OnlyExplicit
    rows:
    - letters:
      - [0]
      - [1]
      - [2]
      - [3]
      - type: base
        spec: '!icon/delete_key|!code/key_delete'
        moreKeys: ['!icon/action_undo|!code/action_undo','!icon/action_redo|!code/action_redo']
        attributes:
          width: FunctionalKey
          style: Functional
      - ['#']
      - ['*']
      - ['@']
      - ['%|%']
    - letters:
      - ['`','~']
      - [4]
      - [5]
      - [6]
      - type: space
        attributes:
          width: FunctionalKey
      - ['(','[','{','<']
      - [')',']','}','>']
      - ['=','≠']
      - ['+']
      splittable: false
    - letters:
      - ['!icon/numpad|!code/key_to_alpha_0_layout']
      - [7]
      - [8]
      - [9]
      - $shift
      - ['!']
      - ['$','¥']
      - ['^']
      - ['\','|']
    - bottom:
      - $action
      - ['!icon/action_select_all|!code/action_select_all']
      - ["'",'"']
      - [',','?']
      - type: base
        spec: '!icon/enter_key|!code/key_enter'
        moreKeys: ['!icon/action_copy|!code/action_copy','!icon/action_paste|!code/action_paste','!icon/action_cut|!code/action_cut','!icon/action_clipboard_history|!code/action_clipboard_history']
        attributes:
          width: FunctionalKey
          style: Functional
      - ['.','/']
      - ['-','_','—','–']
      - ['&']
      - [':',';']
      splittable: true
      attributes:
        moreKeyMode: OnlyExplicit
